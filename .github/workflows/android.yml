name: Android CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Install Gradle 7.5
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle
          # Note: apt install might give a different version, 
          # but we'll try to force the build with the system gradle we just installed 
          # or adjust the build.gradle to match.

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xi-companion-apk
          path: app/build/outputs/apk/debug/app-debug.apk
